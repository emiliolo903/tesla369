<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla PRO V18</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:15px;
}

.container{
max-width:480px;
margin:auto;
}

h1{color:#00F5E0;text-align:center}
h2{color:#FFD700}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00F5E0;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:10px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla PRO V18</h1>

<h2>Tesla</h2>
<input type="text" id="inputTradicional" placeholder="Ej: 3512">
<button onclick="generarTradicional()">Generar Tesla</button>
<div id="resultadosTradicional"></div>

<!-- SECCIÓN PROVINCIA NOCTURNA -->
<h2>Magia Tesla: Afine Cuántico (Terno Prov. Noct.)</h2>
<input type="text" id="inputAfineCuantico" placeholder="Semilla: Ej: 9857 (Prov. Vespertina del mismo día)">
<button onclick="generarAfineCuantico()">🔥 Generar Afine Cuántico</button>
<div id="resultadoAfineCuantico"></div>

<!-- SECCIÓN: CORRENTINA PREVIA -->
<h2>Magia Tesla: Afine Cuántico (Terno Correntina Previa)</h2>
<input type="text" id="inputAfineCuanticoCorrentinaPrevia" placeholder="Semilla: Ej: 8820 (Correntina Nocturna día anterior)">
<button onclick="generarAfineCuanticoCorrentinaPrevia()">🔥 Generar Afine Correntina Previa</button>
<div id="resultadoAfineCuanticoCorrentinaPrevia"></div>

<h2>Historial IA</h2>
<textarea id="historial" placeholder="Pegá números de 4 cifras"></textarea>
<button onclick="guardarMemoria()">💾 Guardar memoria</button>
<button onclick="generarIA()">🔥 Ambos IA</button>
<div id="resultadoIA"></div>

<h2>Guardar sorteos del día</h2>
<button onclick="guardarBloque('previa')">Previa</button>
<button onclick="guardarBloque('primera')">Primera</button>
<button onclick="guardarBloque('matutina')">Matutina</button>
<button onclick="guardarBloque('vespertina')">Vespertina</button>

<button onclick="generarCuaterno()">💣 Cuaterno Nocturna</button>

</div>

<script>

/* ================= MEMORIA ================= */

let memoria = JSON.parse(localStorage.getItem("memoria")) || [];

function guardarMemoria(){

let texto = document.getElementById("historial").value.trim();

let nums = texto.split(/\s+/).filter(n=>n.length===4);

memoria.push(...nums);

localStorage.setItem("memoria", JSON.stringify(memoria));

alert("Guardado");
}

/* ================= TESLA ================= */

const tabla = {
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

function generarTradicional(){

let n = document.getElementById("inputTradicional").value;

if(n.length!=4)return alert("4 cifras");

let c1="",c2="";

for(let d of n){
c1+=tabla[d][0];
c2+=tabla[d][1];
}

document.getElementById("resultadosTradicional").innerHTML=`
<div class="resultado">
${c1} → Ambos ${c1.slice(2)}<br>
${c2} → Ambos ${c2.slice(2)}
</div>`;
}

/* ================= AFINE CUÁNTICO DE LA MAGIA TESLA (Provincia Nocturna) ================= */

function generarAfineCuantico() {
    let semilla = document.getElementById("inputAfineCuantico").value;

    if (semilla.length !== 4 || isNaN(semilla)) {
        return alert("La semilla debe ser un número de 4 cifras.");
    }

    let numSemilla = parseInt(semilla);
    let ternoSemilla = numSemilla % 1000;
    let ternoStr = String(ternoSemilla).padStart(3, '0');
    let ternoInvertido = parseInt(ternoStr.split('').reverse().join(''));
    
    // NUEVO FACTOR DE AJUSTE PARA PROVINCIA NOCTURNA - Recalibrado con datos verificados
    let factorAjuste = 446; 
    
    let resultadoCuantico = (ternoInvertido + factorAjuste) % 1000;
    let prediccionTerno = String(resultadoCuantico).padStart(3, '0');

    document.getElementById("resultadoAfineCuantico").innerHTML = `
        <div class="resultado">
            ✨ Predicción Terno Prov. Noct. (A la Cabeza): <span>${prediccionTerno}</span>
        </div>`;
}

/* ================= AFINE CUÁNTICO DE LA MAGIA TESLA (Correntina Previa) ================= */
// Este algoritmo sigue pendiente de una base de datos más grande para una afinación robusta.
function generarAfineCuanticoCorrentinaPrevia() {
    let semilla = document.getElementById("inputAfineCuanticoCorrentinaPrevia").value;

    if (semilla.length !== 4 || isNaN(semilla)) {
        return alert("La semilla debe ser un número de 4 cifras.");
    }
    
    // Este algoritmo es un placeholder. Necesita más datos para una afinación correcta.
    // Con los 5 datos que teníamos, ningún patrón era consistentemente fuerte.
    
    let s1 = parseInt(semilla[0]);
    let s2 = parseInt(semilla[1]);
    let s3 = parseInt(semilla[2]);
    let s4 = parseInt(semilla[3]);

    let valorBase = (s2 * s3) + (s1 + s4); 
    let factorAjusteCorrentinaPrevia = 153; // Este factor también es provisional.

    let prediccionTernoNumerico = (valorBase + factorAjusteCorrentinaPrevia) % 1000;
    let prediccionTerno = String(prediccionTernoNumerico).padStart(3, '0');

    document.getElementById("resultadoAfineCuanticoCorrentinaPrevia").innerHTML = `
        <div class="resultado">
            ✨ Predicción Terno Correntina Previa (A la Cabeza): <span>${prediccionTerno}</span>
        </div>`;
}

/* ================= IA ================= */

function generarIA(){

let freq={};

memoria.forEach(n=>{
let a=n.slice(2);
freq[a]=(freq[a]||0)+1;
});

let top=Object.entries(freq)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.map(x=>x[0]);

document.getElementById("resultadoIA").innerHTML=`
<div class="resultado">
🔥 ${top.join(" - ")}
</div>`;
}

/* ================= BLOQUES ================= */

let dia={
previa:[],
primera:[],
matutina:[],
vespertina:[]
};

function guardarBloque(tipo){

let texto=document.getElementById("historial").value.trim();

let nums=texto.split(/\s+/).filter(n=>n.length===4);

dia[tipo]=nums;

alert(tipo+" guardado");
}

/* ================= CUATERNO ================= */

function generarCuaterno(){

let todo=[
...dia.previa,
...dia.primera,
...dia.matutina,
...dia.vespertina
];

if(todo.length<5)return alert("Faltan datos");

let conteo={};

todo.forEach(n=>{
n.split('').forEach(d=>{
conteo[d]=(conteo[d]||0)+1;
});
});

let orden=Object.entries(conteo)
.sort((a,b)=>b[1]-a[1])
.map(x=>x[0]);

let cuaterno=orden.slice(0,4).join("");

document.getElementById("resultadoCuaterno").innerHTML=`
<div class="resultado">
💣 Cuaterno fuerte: <span>${cuaterno}</span>
</div>`;
}

</script>

</body>
</html>
