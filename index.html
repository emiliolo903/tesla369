<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V17 MEMORIA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:15px;
}

.container{
max-width:480px;
margin:auto;
}

h1{color:#00F5E0;text-align:center}
h2{color:#FFD700}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00F5E0;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:10px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V17 MEMORIA</h1>

<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTradicional" placeholder="Ej: 3512">

<button onclick="generarTradicional()">Generar Tesla</button>

<div id="resultadosTradicional"></div>

<h2>Historial (IA aprende)</h2>

<textarea id="historial" placeholder="Pegá números de 4 cifras"></textarea>

<button onclick="guardarSorteo()">💾 Guardar en memoria</button>
<button onclick="generarIA()">🔥 Generar Ambos IA</button>

<div id="resultadoIA"></div>

<h2>Poceada</h2>

<input type="text" id="inputPoceada" placeholder="10 números separados">

<button onclick="generarPoceada()">Generar</button>

<div id="resultadoPoceada"></div>

</div>

<script>

/* ================= MEMORIA ================= */

let memoria = JSON.parse(localStorage.getItem("quinielaMemoria")) || [];

/* ================= TESLA ================= */

const tablaTesla = {
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

function generarTradicional(){

let input = document.getElementById("inputTradicional").value;

if(!input){
alert("Ingresá un número");
return;
}

let n = input.replace(/[^0-9]/g,'');

if(n.length !== 4){
alert("Ingresá 4 cifras");
return;
}

let c1="", c2="";

for(let i=0;i<4;i++){
let d = parseInt(n[i]);

c1 += tablaTesla[d][0];
c2 += tablaTesla[d][1];
}

let t1 = c1.slice(1);
let t2 = c2.slice(1);

let a1 = c1.slice(2);
let a2 = c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML =

`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno: <span>${t1}</span><br>
Ambos: <span>${a1}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno: <span>${t2}</span><br>
Ambos: <span>${a2}</span>
</div>
`;

}

/* ================= GUARDAR ================= */

function guardarSorteo(){

let texto = document.getElementById("historial").value.trim();

if(!texto){
alert("Pegá números");
return;
}

let nums = texto.split(/\s+/).filter(n=>n.length===4);

nums.forEach(n=>{
memoria.push(n);
});

localStorage.setItem("quinielaMemoria", JSON.stringify(memoria));

alert("Sorteo guardado en memoria");
}

/* ================= IA ================= */

function generarIA(){

if(memoria.length < 5){
alert("Cargá más datos");
return;
}

let freq = {};
let ultima = {};

memoria.forEach((n,i)=>{
let ambos = n.slice(2);
freq[ambos] = (freq[ambos] || 0) + 1;
ultima[ambos] = i;
});

let candidatos = [];

for(let i=0;i<100;i++){

let num = i.toString().padStart(2,'0');

let score = 0;

if(freq[num]) score += freq[num] * 3;

if(!(num in ultima)) score += 5;

if(ultima[num] != null){
score += (memoria.length - ultima[num]);
}

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top = candidatos.slice(0,3).map(c=>c.num);

document.getElementById("resultadoIA").innerHTML =

`
<div class="resultado">
🔥 Ambos IA:<br>
<span>${top.join(" - ")}</span>
</div>
`;

}

/* ================= POCEADA ================= */

function generarPoceada(){

let input = document.getElementById("inputPoceada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length !== 10){
alert("Ingresá 10 números");
return;
}

let freq = {};

input.forEach(n=>{
freq[n] = (freq[n] || 0) + 1;
});

let candidatos = [];

for(let i=0;i<100;i++){
let num = i.toString().padStart(2,'0');

if(!freq[num]){
candidatos.push(num);
}
}

let resultado = candidatos.slice(0,5);

document.getElementById("resultadoPoceada").innerHTML =

`
<div class="resultado">
🎯 Sugeridos: <span>${resultado.join(" - ")}</span>
</div>
`;

}

</script>

</body>
</html>
