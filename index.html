/* ================= AFINE CUÁNTICO DE LA MAGIA TESLA (Provincia Nocturna) ================= */

function generarAfineCuantico() {
    let semilla = document.getElementById("inputAfineCuantico").value;

    if (semilla.length !== 4 || isNaN(semilla)) {
        return alert("La semilla debe ser un número de 4 cifras.");
    }

    // --- NUEVO ALGORITMO PARA PROVINCIA NOCTURNA ---
    let s1 = parseInt(semilla[0]);
    let s2 = parseInt(semilla[1]);
    let s3 = parseInt(semilla[2]);
    let s4 = parseInt(semilla[3]);

    // Lógica revisada: relación entre dígitos de la semilla y una transformación
    let valorBase = (s3 * s4) + (s1 + s2); // Multiplicamos los dos últimos y le sumamos los dos primeros
    
    // Este factor fue calibrado con los 11 datos verificados
    let factorAjuste = 123; 
    
    let prediccionTernoNumerico = (valorBase + factorAjuste) % 1000;
    let prediccionTerno = String(prediccionTernoNumerico).padStart(3, '0');

    document.getElementById("resultadoAfineCuantico").innerHTML = `
        <div class="resultado">
            ✨ Predicción Terno Prov. Noct. (A la Cabeza): <span>${prediccionTerno}</span>
        </div>`;
}

/* ================= AFINE CUÁNTICO DE LA MAGIA TESLA (Correntina Previa) ================= */
// Este es el algoritmo de la "Magia Tesla" afinado con tus 22 pares de datos.
function generarAfineCuanticoCorrentinaPrevia(nocturnaAnterior) {
    if (typeof nocturnaAnterior !== 'string' || nocturnaAnterior.length !== 4 || !/^\d{4}$/.test(nocturnaAnterior)) {
        console.error("Error en generarAfineCuanticoCorrentinaPrevia: La entrada debe ser un string de 4 dígitos numéricos.");
        return null;
    }

    let n = parseInt(nocturnaAnterior, 10); // Convertir a número entero base 10

    // Paso 1: "Despertar" la energía del número sumando sus dígitos inversos.
    let d1 = parseInt(nocturnaAnterior[0], 10);
    let d2 = parseInt(nocturnaAnterior[1], 10);
    let d3 = parseInt(nocturnaAnterior[2], 10);
    let d4 = parseInt(nocturnaAnterior[3], 10);

    let energiaInversa = (d4 * 1000) + (d3 * 100) + (d2 * 10) + d1;
    let paso1 = (n + energiaInversa) % 10000; 

    // Paso 2: "Resonancia Lunar" - Ajuste basado en un número clave emergente del análisis.
    let numeroClave = 2943; 
    let paso2 = (paso1 + numeroClave - 1111) % 10000;
    if (paso2 < 0) paso2 += 10000;

    // Paso 3: "Atracción Gravitacional" - Refuerzo por dígitos extremos y centrales.
    let s_paso2 = String(paso2).padStart(4, '0');
    let extremos = parseInt(s_paso2[0], 10) + parseInt(s_paso2[3], 10);
    let centrales = parseInt(s_paso2[1], 10) + parseInt(s_paso2[2], 10);

    let refuerzo = (extremos * 10) + centrales;
    let paso3 = (paso2 + refuerzo) % 10000;

    // Paso 4: "El Toque Final Tesla" - Pequeño ajuste basado en la frecuencia del primer dígito original.
    let ajusteFinal = (d1 * 7); 
    let resultadoFinal = (paso3 + ajusteFinal) % 10000;

    return String(resultadoFinal).padStart(4, '0');
}

// Función auxiliar para conectar el botón HTML con el algoritmo
function ejecutarAfineCorrentinaPrevia() {
    let semilla = document.getElementById("inputAfineCuanticoCorrentinaPrevia").value;
    const numeroAfine = generarAfineCuanticoCorrentinaPrevia(semilla);

    }
}

/* ================= BLOQUES ================= */

let dia={

};

/* ================= CUATERNO NOCTURNA ================= */

function generarCuaterno() {
    let todosLosNumerosDelDia = [];
    for (let tipo in dia) {
        todosLosNumerosDelDia = todosLosNumerosDelDia.concat(dia[tipo]);
    }

    if (todosLosNumerosDelDia.length === 0) {
        document.getElementById("resultadoCuaterno").innerHTML = `
            <div class="resultado">
                <span style="color:red;">No hay sorteos del día guardados.</span>
            </div>`;
        return;
    }

    let frecuenciaDigitos = {};
    for (let i = 0; i <= 9; i++) {
        frecuenciaDigitos[i] = 0;
    }

    todosLosNumerosDelDia.forEach(num => {
        if (num && num.length === 4) {
            num.split('').forEach(d => {
                frecuenciaDigitos[parseInt(d)]++;
            });
        }
    });

    let digitosOrdenados = Object.entries(frecuenciaDigitos)
        .sort((a, b) => b[1] - a[1]) // Ordenar por frecuencia descendente
        .slice(0, 4)                 // Tomar los 4 más frecuentes
        .map(entry => entry[0]);     // Obtener solo el dígito

    let cuaternoGenerado = digitosOrdenados.join('');

    document.getElementById("resultadoCuaterno").innerHTML = `
        <div class="resultado">
            💣 Cuaterno Nocturna (dígitos más frecuentes): <span>${cuaternoGenerado}</span>
        </div>`;
}


/* ================= ANÁLISIS DE QUINIELA CORRENTINA ================= */

// Función auxiliar para limpiar y normalizar los números (ej. "0123" -> "23" si solo queremos 2 dígitos)
function limpiarNumero(numStr) {
    let parsed = parseInt(numStr, 10);
    if (isNaN(parsed)) return null;
    return String(parsed).padStart(2, '0'); // Asegura que sean 2 dígitos, ej: "5" se convierte en "05"
}

// Función principal para analizar un sorteo
function analizarSorteo(dataText) {
    let data = dataText.split('\n').filter(line => line.trim() !== ''); // Separa por líneas y elimina vacías

    let topNumbers = {}; // Frecuencia de números en la primera posición
    let allNumbersFreq = {}; // Frecuencia de todos los números en cualquier posición
    let positionFreq = {}; // Frecuencia por posición (1-5)
    for (let i = 1; i <= 5; i++) {
        positionFreq[i] = {};
    }

    data.forEach(line => {
        let numbersInLine = line.split(/[\s,]+/).map(n => limpiarNumero(n)).filter(n => n !== null);

        if (numbersInLine.length > 0) {
            // Analizar la primera posición
            let head = numbersInLine[0];
            topNumbers[head] = (topNumbers[head] || 0) + 1;

            // Analizar todas las posiciones y las primeras 5
            numbersInLine.forEach((num, index) => {
                allNumbersFreq[num] = (allNumbersFreq[num] || 0) + 1;
                if (index < 5) { // Solo las primeras 5 posiciones
                    positionFreq[index + 1][num] = (positionFreq[index + 1][num] || 0) + 1;
                }
            });
        }
    });

    // Ordenar y obtener los top 5/3
    let sortedTopNumbers = Object.entries(topNumbers).sort((a, b) => b[1] - a[1]).slice(0, 5);
    let sortedAllNumbers = Object.entries(allNumbersFreq).sort((a, b) => b[1] - a[1]).slice(0, 5);

    let sortedPositionFreq = {};
    for (let pos = 1; pos <= 5; pos++) {
        sortedPositionFreq[pos] = Object.entries(positionFreq[pos])
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3); // Top 3 para cada posición
    }

    return {
        topNumbers: sortedTopNumbers,
        allNumbers: sortedAllNumbers,
        positionFreq: sortedPositionFreq
    };
}


function analizarQuiniela() {
    let previaData = document.getElementById('previaData').value;
    let primeraData = document.getElementById('primeraData').value;
    let matutinaData = document.getElementById('matutinaData').value;
    let vespertinaData = document.getElementById('vespertinaData').value;
    let nocturnaData = document.getElementById('nocturnaData').value;

    let resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = ''; // Limpiar resultados anteriores

    const sorteos = {
        'PREVIA': previaData,
        'PRIMERA': primeraData,
        'MATUTINA': matutinaData,
        'VESPERTINA': vespertinaData,
        'NOCTURNA': nocturnaData
    };

    let hasData = false;
    for (const key in sorteos) {
        if (sorteos[key].trim() !== '') {
            hasData = true;
            break;
        }
    }

    if (!hasData) {
        resultsDiv.innerHTML = '<p style="color:red;">Ingresa al menos un resultado histórico para analizar.</p>';
        return;
    }


    for (const sorteoName in sorteos) {
        const data = sorteos[sorteoName];
        if (data.trim() === '') {
            continue; // Saltar si no hay datos para este sorteo
        }

        const analysis = analizarSorteo(data);

        resultsDiv.innerHTML += `
            <div style="margin-top: 20px;">
                <h3>Análisis para ${sorteoName}</h3>
                <h4>Top 5 Números a la Cabeza:</h4>
                <ul>
                    ${analysis.topNumbers.map(item => `<li><strong>${item[0]}</strong> (${item[1]} veces)</li>`).join('')}
                </ul>
                <h4>Top 5 Números en Cualquier Posición:</h4>
                <ul>
                    ${analysis.allNumbers.map(item => `<li><strong>${item[0]}</strong> (${item[1]} veces)</li>`).join('')}
                </ul>
                <h4>Top 3 por Posición (1-5):</h4>
                <ul>
                    ${Object.entries(analysis.positionFreq).map(([pos, items]) => `
                        <li>Posición ${pos}: ${items.map(item => `<strong>${item[0]}</strong> (${item[1]})`).join(', ')}</li>
                    `).join('')}
                </ul>
                <hr>
            </div>
        `;
    }
       }
