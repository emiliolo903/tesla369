<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela V18</title>
<style>
body{background:#0d0d0d;color:white;font-family:Arial;padding:15px}
input,button{width:100%;padding:12px;margin:5px 0;border-radius:8px;border:none}
button{background:#00d1b2;color:black;font-weight:bold}
.resultado{background:#1a1a1a;padding:10px;margin-top:10px;border-radius:10px}
h2{color:gold}
</style>
</head>
<body><h2>Quiniela Tradicional (Tesla)</h2>
<input id="inputTradicional" placeholder="Ej: 3512">
<button onclick="generarTradicional()">Generar Tesla</button>
<div id="resultadosTradicional"></div><h2>IA Quiniela</h2>
<textarea id="inputIA" placeholder="Pegá 3 números\nEj:\n2360\n9437\n6464"></textarea>
<button onclick="generarIA()">Generar IA</button>
<div id="resultadoIA"></div><h2>Detector PRO</h2>
<button onclick="detectar()">Buscar coincidencias</button>
<div id="resultadoPRO"></div><script>

const tablaTesla = {
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

function generarTradicional(){

let input = document.getElementById("inputTradicional").value;

if(!input){
alert("Ingresá un número");
return;
}

let n = input.replace(/[^0-9]/g,'');

if(n.length !== 4){
alert("Ingresá 4 cifras");
return;
}

let c1="", c2="";

for(let i=0;i<4;i++){
let d = parseInt(n[i]);

c1 += tablaTesla[d][0];
 c2 += tablaTesla[d][1];
}

let t1 = c1.slice(1);
let t2 = c2.slice(1);

let a1 = c1.slice(2);
let a2 = c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML =
`
<div class="resultado">
Cuaterno 1: <b>${c1}</b><br>
Terno: <b>${t1}</b><br>
Ambos: <b>${a1}</b>
</div>

<div class="resultado">
Cuaterno 2: <b>${c2}</b><br>
Terno: <b>${t2}</b><br>
Ambos: <b>${a2}</b>
</div>
`;

}

function generarIA(){
let data = document.getElementById("inputIA").value.split("\n");
let salida = data.map(n=>{
if(n.length===4){
let ult2 = n.slice(2);
return ult2;
}
}).join(" - ");

document.getElementById("resultadoIA").innerHTML = salida;
}

function detectar(){
let tesla = document.getElementById("resultadosTradicional").innerText;
let ia = document.getElementById("resultadoIA").innerText;

let encontrados = [];

let ambosTesla = tesla.match(/\d{2}/g) || [];
let ambosIA = ia.split(" - ");

ambosTesla.forEach(t=>{
if(ambosIA.includes(t)){
encontrados.push(t);
}
});

if(encontrados.length>0){
document.getElementById("resultadoPRO").innerHTML = "💣 Ambos fuerte: " + encontrados.join(" - ");
}else{
document.getElementById("resultadoPRO").innerHTML = "Sin coincidencias";
}
}

</script></body>
</html>
