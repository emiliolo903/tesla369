<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla PRO V18</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:15px;
}

.container{
max-width:480px;
margin:auto;
}

h1{color:#00F5E0;text-align:center}
h2{color:#FFD700; margin-top: 25px;}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:16px;
background:#333;
color:#fff;
}

button{
width:100%;
padding:12px;
background:#00F5E0;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:10px;
cursor:pointer;
color:#111;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

span{
color:#00FFAA;
font-weight:bold;
}

.input-section-quiniela, .result-section-quiniela {
margin-top: 20px;
padding: 15px;
border: 1px solid #444;
border-radius: 8px;
background-color: #1a1a1a;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla PRO V18</h1>

<h2>Tesla</h2>
<input type="text" id="inputTradicional">
<button onclick="generarTradicional()">Generar Tesla</button>
<div id="resultadosTradicional" class="resultado"></div>

<h2>Historial IA</h2>
<textarea id="historial"></textarea>
<button onclick="guardarMemoria()">💾 Guardar memoria</button>
<button onclick="generarIA()">🔥 Ambos IA</button>
<div id="resultadoIA" class="resultado"></div>

<h2>Guardar sorteos del día</h2>
<button onclick="guardarBloque('previa')">Previa</button>
<button onclick="guardarBloque('primera')">Primera</button>
<button onclick="guardarBloque('matutina')">Matutina</button>
<button onclick="guardarBloque('vespertina')">Vespertina</button>

<button onclick="generarCuaterno()">💣 Cuaterno Nocturna</button>
<div id="resultadoCuaterno" class="resultado"></div>

</div>

<script>

/* ================= MEMORIA ================= */

let memoria = JSON.parse(localStorage.getItem("memoria")) || [];

function guardarMemoria(){
let texto = document.getElementById("historial").value.trim();
let nums = texto.split(/\s+/).filter(n=>n.length===4);
memoria.push(...nums);
localStorage.setItem("memoria", JSON.stringify(memoria));
alert("Guardado");
}

/* ================= TESLA ================= */

const tabla = {
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],4:['6','9'],
5:['2','7'],6:['4','9'],7:['5','2'],8:['3','0'],9:['3','4']
};

function generarTradicional(){
let n = document.getElementById("inputTradicional").value;
if(n.length!=4)return alert("4 cifras");

let c1="",c2="";
for(let d of n){
c1+=tabla[d][0];
c2+=tabla[d][1];
}

document.getElementById("resultadosTradicional").innerHTML=`
<div class="resultado">
${c1} → Ambos ${c1.slice(2)}<br>
${c2} → Ambos ${c2.slice(2)}
</div>`;
}

/* ================= IA ================= */

function generarIA(){

let freq={};

memoria.forEach(n=>{
let a = n.slice(2);
freq[a] = (freq[a] || 0) + 1;
});

let top=Object.entries(freq)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.map(x=>x[0]);

document.getElementById("resultadoIA").innerHTML=`
<div class="resultado">
🔥 ${top.join(" - ")}
</div>`;
}

/* ================= BLOQUES ================= */

let dia={
previa:[],
primera:[],
matutina:[],
vespertina:[]
};

function guardarBloque(tipo){
let texto=document.getElementById("historial").value.trim();
let nums=texto.split(/\s+/).filter(n=>n.length===4);
dia[tipo]=nums;
alert(tipo+" guardado");
}

/* ================= CUATERNO ================= */

function generarCuaterno(){

let todosLosNumerosDelDia = [];
for (let tipo in dia) {
todosLosNumerosDelDia = todosLosNumerosDelDia.concat(dia[tipo]);
}

if (todosLosNumerosDelDia.length === 0) {
document.getElementById("resultadoCuaterno").innerHTML = `
<div class="resultado">
<span style="color:red;">No hay sorteos del día guardados.</span>
</div>`;
return;
}

let frecuenciaDigitos = {};
for (let i = 0; i <= 9; i++) {
frecuenciaDigitos[i] = 0;
}

todosLosNumerosDelDia.forEach(num => {
if (num && num.length === 4) {
num.split('').forEach(d => {
frecuenciaDigitos[parseInt(d)]++;
});
}
});

let digitosOrdenados = Object.entries(frecuenciaDigitos)
.sort((a, b) => b[1] - a[1])
.slice(0, 4)
.map(entry => entry[0]);

let cuaternoGenerado = digitosOrdenados.join('');

// 🔥 AMBOS
let a1 = cuaternoGenerado.slice(0,2);
let a2 = cuaternoGenerado.slice(1,3);
let a3 = cuaternoGenerado.slice(2,4);

// 🔁 INVERTIDOS
let i1 = a1.split('').reverse().join('');
let i2 = a2.split('').reverse().join('');
let i3 = a3.split('').reverse().join('');

document.getElementById("resultadoCuaterno").innerHTML = `
<div class="resultado">
💣 Cuaterno: <span>${cuaternoGenerado}</span><br><br>

🔥 Ambos:<br>
${a1} - ${a2} - ${a3}<br><br>

🔁 Invertidos:<br>
${i1} - ${i2} - ${i3}
</div>`;
}

</script>

</body>
</html>
