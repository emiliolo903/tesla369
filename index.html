<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V13 MIX</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V13 MIX</h1>

<!-- ================= TESLA ================= -->

<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Generar Tesla</button>

<div id="resultadosTradicional"></div>

<!-- ================= IA ================= -->

<h2>IA Quiniela PRO (Base 7)</h2>

<textarea id="baseIA" placeholder="Pegá los 7 cuaternos del sorteo anterior"></textarea>

<button onclick="generarIA()">Generar IA</button>

<div id="resultadoIA"></div>

<!-- ================= POCEADA ================= -->

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada">

<button onclick="generarPoseada()">Generar Poceada</button>

<div id="resultadosPoseada"></div>

</div>

<script>

/* ===== TESLA (INTACTO) ===== */

const tablaTesla={
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

function generarTradicional(){

let n=document.getElementById("inputTradicional").value.trim();

if(n.length!==4){
alert("Ingresá 4 cifras");
return;
}

let c1="",c2="";

for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

let t1=c1.slice(1);
let t2=c2.slice(1);

let a1=c1.slice(2);
let a2=c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno 1: <span>${t1}</span><br>
Ambos 1: <span>${a1}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno 2: <span>${t2}</span><br>
Ambos 2: <span>${a2}</span>
</div>
`;

}

/* ===== IA SEPARADA ===== */

function generarIA(){

let texto=document.getElementById("baseIA").value.trim();

let base=texto.split(/[\s,]+/).filter(n=>n.length===4);

if(base.length!==7){
alert("Ingresá los 7 cuaternos");
return;
}

/* separar posiciones */
let p1=[],p2=[],p3=[],p4=[];

base.forEach(n=>{
p1.push(n[0]);
p2.push(n[1]);
p3.push(n[2]);
p4.push(n[3]);
});

/* generar números */
function generarNumero(){

let n=
p1[Math.floor(Math.random()*p1.length)] +
p2[Math.floor(Math.random()*p2.length)] +
p3[Math.floor(Math.random()*p3.length)] +
p4[Math.floor(Math.random()*p4.length)];

if(base.includes(n)) return generarNumero();
if(/^(\d)\1+$/.test(n)) return generarNumero();

return n;
}

let jugadas=[];

while(jugadas.length<3){
let n=generarNumero();
if(!jugadas.includes(n)){
jugadas.push(n);
}
}

/* horarios */
let turnos=["Mañana","Tarde","Noche"];

let html=`<div class="resultado">🎯 BASE:<br><span>${base.join(" - ")}</span></div>`;

jugadas.forEach((n,i)=>{

html+=`
<div class="resultado">
🔥 Jugada ${i+1}: <span>${n}</span><br>
⏰ ${turnos[i]}<br>
📍 Agencia: Variable
</div>
`;

});

document.getElementById("resultadoIA").innerHTML=html;

}

/* ===== POCEADA (BÁSICA) ===== */

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

let candidatos=[];

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
if(!input.includes(num)){
candidatos.push(num);
}
}

let resultado=candidatos.sort(()=>0.5-Math.random()).slice(0,6);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
🎯 Jugada:<br>
<span>${resultado.join(" - ")}</span>
</div>
`;

}

</script>

</body>
  </html>
