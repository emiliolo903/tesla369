<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V10</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V10</h1>

<h2>Quiniela Tradicional</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Generar</button>

<div id="resultadosTradicional"></div>


<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada" placeholder="Ingresar 10 números del último sorteo">

<button onclick="generarPoseada()">Generar Poceada</button>

<button onclick="autoPoceada()">AUTO Analizar 20 sorteos</button>

<button onclick="detectorProximo()">Detector próximo sorteo</button>

<div id="resultadosPoseada"></div>

<div id="detectorResultado"></div>


<h2>Cargar 20 sorteos históricos</h2>

<textarea id="historico20" placeholder="Pegar 20 sorteos (10 números por línea)"></textarea>

<button onclick="cargarHistorico20()">Cargar histórico</button>

</div>

<script>

const tablaTesla={
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

let historico=[];

function generarTradicional(){

let n=document.getElementById("inputTradicional").value.trim();

n=n.replace(/\D/g,'');

if(n.length!==4){
alert("Ingresá un número de 4 cifras");
return;
}

let cuaterno1="";
let cuaterno2="";

for(let i=0;i<4;i++){

let d=parseInt(n[i]);

let nums=tablaTesla[d];

cuaterno1+=nums[0];
cuaterno2+=nums[1];

}

let terno1=cuaterno1.substring(1);
let terno2=cuaterno2.substring(1);

let ambos1=cuaterno1.substring(2);
let ambos2=cuaterno2.substring(2);

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">

Cuaterno 1: <span>${cuaterno1}</span><br>
Terno 1: <span>${terno1}</span><br>
Ambos 1: <span>${ambos1}</span>

</div>

<div class="resultado">

Cuaterno 2: <span>${cuaterno2}</span><br>
Terno 2: <span>${terno2}</span><br>
Ambos 2: <span>${ambos2}</span>

</div>
`;

}

function espejo(n){
return n[1]+n[0];
}

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

historico.push(input);

if(historico.length>20) historico.shift();

analizarHistorico(input);

}

function analizarHistorico(input){

let freq={};
let decadas={};
let finales={};
let ultima={};

historico.forEach((j,i)=>{

j.forEach(n=>{

freq[n]=(freq[n]||0)+1;

let d=Math.floor(parseInt(n)/10);

decadas[d]=(decadas[d]||0)+1;

finales[n[1]]=(finales[n[1]]||0)+1;

ultima[n]=i;

});

});

let decadasTop=Object.keys(decadas)
.sort((a,b)=>decadas[b]-decadas[a])
.slice(0,3);

let finalesTop=Object.keys(finales)
.sort((a,b)=>finales[b]-finales[a])
.slice(0,3);

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

if(input && input.includes(num)) continue;

let score=0;

if(freq[num]) score+=freq[num]*2;

let d=Math.floor(i/10).toString();

if(decadasTop.includes(d)) score+=3;

if(finalesTop.includes(num[1])) score+=3;

if(!(num in ultima)) score+=5;

if(input){

let esp=espejo(num);

if(input.includes(esp)) score+=3;

}

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let expansion=candidatos.slice(0,10);

let principal=expansion.slice(0,5).map(c=>c.num);

let respaldo=expansion.slice(5,8).map(c=>c.num);

let radar=expansion.slice(8,10).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
Principal: <span>${principal.join(" - ")}</span>
</div>

<div class="resultado">
Respaldo: <span>${respaldo.join(" - ")}</span>
</div>

<div class="resultado">
Radar atraso: <span>${radar.join(" - ")}</span>
</div>
`;

}

function detectorProximo(){

if(historico.length<10){
alert("Cargá los sorteos primero");
return;
}

let freq={};
let ultima={};

historico.forEach((j,i)=>{

j.forEach(n=>{

freq[n]=(freq[n]||0)+1;

ultima[n]=i;

});

});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

let score=0;

if(freq[num]) score+=freq[num]*2;

if(!(num in ultima)) score+=6;

let esp=num[1]+num[0];

if(freq[esp]) score+=3;

historico[historico.length-1].forEach(n=>{

let base=parseInt(n);

let vecinos=[base-1,base+1];

vecinos.forEach(v=>{

if(v>=0 && v<=99){

let vv=v.toString().padStart(2,'0');

if(vv===num) score+=3;

}

});

});

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let prediccion=candidatos.slice(0,6).map(c=>c.num);

document.getElementById("detectorResultado").innerHTML=

`
<div class="resultado">
Detector próximo sorteo:<br>
<span>${prediccion.join(" - ")}</span>
</div>
`;

}

function autoPoceada(){

if(historico.length<10){
alert("Necesitas cargar los sorteos históricos");
return;
}

analizarHistorico();

}

function cargarHistorico20(){

let texto=document.getElementById("historico20").value.trim();

let lineas=texto.split(/\n+/);

historico=[];

lineas.slice(0,20).forEach(l=>{

let nums=l.split(/[\s,]+/).map(n=>n.padStart(2,'0'));

if(nums.length===10){
historico.push(nums);
}

});

alert("Histórico cargado");

}

</script>

</body>
</html>
