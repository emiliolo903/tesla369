<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V17 FINAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
justify-content:center;
padding:15px;
}
.container{max-width:480px;width:100%;text-align:center;}
h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea,select{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:10px;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{color:#00FFAA;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V17</h1>

<!-- ================= TESLA ================= -->

<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTesla" placeholder="Número 4 cifras">

<button onclick="generarTesla()">Generar Tesla</button>

<div id="resultadoTesla"></div>

<!-- ================= IA ================= -->

<h2>🧠 IA Quiniela PRO</h2>

<textarea id="inputIA" placeholder="Pegar 7 cuaternos"></textarea>

<select id="turno">
<option value="mañana">Mañana</option>
<option value="tarde">Tarde</option>
<option value="noche">Noche</option>
</select>

<button onclick="usarTurnoAnterior()">Usar turno anterior automático</button>

<button onclick="generarIA()">Generar IA</button>

<div id="resultadoIA"></div>

<!-- ================= POCEADA ================= -->

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoceada" placeholder="10 números">

<button onclick="generarPoceada()">Generar</button>

<div id="resultadoPoceada"></div>

</div>

<script>

/* ================= TESLA ================= */

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],
4:['6','9'],5:['2','7'],6:['4','9'],7:['5','2'],
8:['3','0'],9:['3','4']
};

function generarTesla(){

let n=document.getElementById("inputTesla").value;

if(n.length!==4)return alert("4 cifras");

let c1="",c2="";

for(let i=0;i<4;i++){
c1+=tablaTesla[n[i]][0];
c2+=tablaTesla[n[i]][1];
}

document.getElementById("resultadoTesla").innerHTML=`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno: <span>${c1.slice(1)}</span><br>
Ambos: <span>${c1.slice(2)}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno: <span>${c2.slice(1)}</span><br>
Ambos: <span>${c2.slice(2)}</span>
</div>`;
}

/* ================= IA PRO ================= */

let memoriaIA=[];

function limpiarNumeros(lista){
return lista.filter(n=>!/(\d)\1\1\1/.test(n)); // evita 1111
}

function analizarFrecuencia(nums){
let freq={};

nums.forEach(n=>{
n.split('').forEach(d=>{
freq[d]=(freq[d]||0)+1;
});
});

return freq;
}

function generarIA(){

let base=document.getElementById("inputIA").value
.split(/\s+/)
.filter(n=>n.length===4);

if(base.length<3) return alert("Mínimo 3 números");

memoriaIA.push(base);
if(memoriaIA.length>30) memoriaIA.shift();

/* ANALISIS */

let freq=analizarFrecuencia(base);

let candidatos=[];

for(let i=0;i<10000;i++){

let num=i.toString().padStart(4,'0');

let score=0;

/* frecuencia */
num.split('').forEach(d=>{
if(freq[d]) score+=freq[d];
});

/* evitar repetidos */
if(/(\d)\1\1/.test(num)) score-=10;

/* atraso */
let salió=false;
memoriaIA.forEach(hist=>{
if(hist.includes(num)) salió=true;
});
if(!salió) score+=5;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let jugadas=limpiarNumeros(
candidatos.slice(0,20).map(x=>x.num)
).slice(0,3);

mostrarIA(jugadas);
}

function mostrarIA(jugadas){

let turno=document.getElementById("turno").value;

let html="";

jugadas.forEach((n,i)=>{

let turnoFinal=turno;

if(i===1) turnoFinal="mañana";
if(i===2) turnoFinal="noche";

html+=`
<div class="resultado">
🔥 Jugada ${i+1}: <span>${n}</span><br>
🎯 Terno: <span>${n.slice(1)}</span><br>
💰 Ambos: <span>${n.slice(2)}</span><br>
⏰ ${turnoFinal}
</div>`;
});

document.getElementById("resultadoIA").innerHTML=html;
}

/* AUTO TURNO */

function usarTurnoAnterior(){

let turno=document.getElementById("turno");

if(turno.value==="mañana") turno.value="noche";
else if(turno.value==="tarde") turno.value="mañana";
else turno.value="tarde";

alert("Turno ajustado automáticamente");
}

/* ================= POCEADA ================= */

let historialPoceada=[];

function generarPoceada(){

let nums=document.getElementById("inputPoceada").value
.split(/\s+/)
.map(n=>n.padStart(2,'0'));

if(nums.length!==10) return alert("10 números");

historialPoceada.push(nums);
if(historialPoceada.length>20) historialPoceada.shift();

let freq={};

historialPoceada.forEach(j=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});
});

let candidatos=[];

for(let i=0;i<100;i++){

let n=i.toString().padStart(2,'0');

let score=0;

if(freq[n]) score+=freq[n]*2;
else score+=5;

candidatos.push({n,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,5).map(x=>x.n);

document.getElementById("resultadoPoceada").innerHTML=`
<div class="resultado">
🎯 ${top.join(" - ")}
</div>`;
}

</script>

</body>
</html>
