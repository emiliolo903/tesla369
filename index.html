<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EMI Tesla Predictor V5</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#00ffcc;
}

button{
padding:12px;
margin:10px;
font-size:18px;
background:#00ffcc;
border:none;
border-radius:8px;
cursor:pointer;
}

.resultado{
font-size:28px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>EMI Tesla Predictor V5</h1>

<button onclick="generar()">Generar combinación</button>

<div class="resultado" id="principal"></div>
<div class="resultado" id="extra"></div>

<script>

// HISTORICO (podés actualizarlo)
let historico = [
11,12,33,63,71,
14,20,29,22,18,
0,12,42,48,54,
56,66,85,87,99
]

// función random
function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

// refuerzo Tesla 3-6-9
function teslaBoost(n){
let r=n
if(r%3==0) r+=1
if(r>99) r-=10
return r
}

// balance de décadas
function generarDecadas(){

let numeros=[]

numeros.push(random(0,9))
numeros.push(random(10,19))
numeros.push(random(40,49))
numeros.push(random(50,59))
numeros.push(random(80,99))

return numeros

}

// afinidad histórica
function afinidad(){

let pick=historico[random(0,historico.length-1)]

return teslaBoost(pick)

}

// generar jugada
function generar(){

let base=generarDecadas()

let afin1=afinidad()
let afin2=afinidad()
let afin3=afinidad()

let todos=[...base,afin1,afin2,afin3]

todos=[...new Set(todos)]

while(todos.length<8){
todos.push(random(0,99))
}

let principal=todos.slice(0,5)
let extra=todos.slice(5,8)

document.getElementById("principal").innerHTML=
"🎯 PRINCIPAL: "+principal.join(" - ")

document.getElementById("extra").innerHTML=
"⭐ EXTRA: "+extra.join(" - ")

}

</script>

</body>
</html>
