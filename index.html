<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V16 FINAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}
.container{
max-width:480px;
width:100%;
text-align:center;
}
h1{color:#00F5E0}
h2{color:#FFD700}
input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}
button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}
.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}
span{
color:#00FFAA;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V16 FINAL</h1>

<!-- ===== TESLA ===== -->

<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Generar Tesla</button>

<div id="resultadosTradicional"></div>

<!-- ===== IA ===== -->

<h2>IA Quiniela</h2>

<textarea id="baseIA" placeholder="Pegar 7 cuaternos anteriores"></textarea>

<button onclick="generarIA()">Generar IA</button>

<div id="resultadoIA"></div>

<!-- ===== DETECTOR ===== -->

<h2>Detector PRO (IA + Tesla)</h2>

<button onclick="detectarCoincidencias()">Buscar coincidencias</button>

<div id="resultadoDetector"></div>

<!-- ===== POCEADA ===== -->

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada" placeholder="10 números del sorteo">

<button onclick="generarPoseada()">Generar Poceada</button>

<div id="resultadosPoseada"></div>

</div>

<script>

/* ===== TESLA ===== */

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],
4:['6','9'],5:['2','7'],6:['4','9'],7:['5','2'],
8:['3','0'],9:['3','4']
};

function generarTradicional(){

let n=document.getElementById("inputTradicional").value.trim();

if(n.length!==4){
alert("Ingresá 4 cifras");
return;
}

let c1="",c2="";

for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

let t1=c1.slice(1);
let t2=c2.slice(1);

let a1=c1.slice(2);
let a2=c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno: <span>${t1}</span><br>
Ambos: <span>${a1}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno: <span>${t2}</span><br>
Ambos: <span>${a2}</span>
</div>
`;

}

/* ===== IA ===== */

function generarIA(){

let base=document.getElementById("baseIA").value
.split(/[\s,]+/)
.filter(n=>n.length===4);

if(base.length<7){
alert("Cargar 7 cuaternos");
return;
}

let resultados=[];

for(let i=0;i<3;i++){
let n=base[Math.floor(Math.random()*base.length)];
let nuevo=n.slice(0,3)+Math.floor(Math.random()*10);
resultados.push(nuevo);
}

document.getElementById("resultadoIA").innerHTML=

`
<div class="resultado">
<span>${resultados.join(" - ")}</span>
</div>
`;

}

/* ===== DETECTOR ===== */

function detectarCoincidencias(){

let tesla=document.getElementById("resultadosTradicional").innerText.match(/\d{4}/g)||[];
let ia=document.getElementById("resultadoIA").innerText.match(/\d{4}/g)||[];

if(tesla.length===0 || ia.length===0){
alert("Generá Tesla e IA primero");
return;
}

let bomba="----";
let terno="";
let ambo="";

ia.forEach(i=>{
tesla.forEach(t=>{

if(i===t){
bomba=i;
}

if(i.slice(1)===t.slice(1)){
terno=i.slice(1);
}

if(i.slice(2)===t.slice(2)){
ambo=i.slice(2);
}

});
});

document.getElementById("resultadoDetector").innerHTML=

`
<div class="resultado">
💣 Bomba: <span>${bomba}</span><br>
🎯 Terno: <span>${terno || "--"}</span><br>
💰 Ambo: <span>${ambo || "--"}</span>
</div>
`;

}

/* ===== POCEADA ===== */

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

if(input.includes(num)) continue;

let score=0;

let esp=num[1]+num[0];
if(input.includes(esp)) score+=3;

input.forEach(n=>{
let base=parseInt(n);
[base-1,base+1].forEach(v=>{
if(v>=0 && v<=99){
if(v.toString().padStart(2,'0')===num){
score+=2;
}
}
});
});

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,6).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
🎯 Jugada:<br>
<span>${top.join(" - ")}</span>
</div>
`;

}

</script>

</body>
</html>
