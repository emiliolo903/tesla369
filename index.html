<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Quiniela Tesla</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

textarea{
width:90%;
height:120px;
font-size:18px;
padding:10px;
margin:10px;
}

button{
padding:12px 20px;
margin:8px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

#tradicional{background:#ff9800;color:white;}
#poceada{background:#4caf50;color:white;}
#limpiar{background:#f44336;color:white;}

#resultado{
margin-top:20px;
font-size:20px;
background:#222;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<h2>APP QUINIELA TESLA</h2>

<p>Pegar números del sorteo</p>

<textarea id="numeros"></textarea>

<br>

<button id="tradicional" onclick="tradicional()">Quiniela Tradicional</button>
<button id="poceada" onclick="poceada()">5 + 3</button>
<button id="limpiar" onclick="limpiar()">Limpiar</button>

<div id="resultado"></div>

<script>

const metodoTesla={
0:[0,0],
1:[0,0],
2:[5,7],
3:[8,0],
4:[6,9],
5:[2,7],
6:[4,9],
7:[5,2],
8:[3,0],
9:[3,4]
};

function obtenerNumeros(){

let texto=document.getElementById("numeros").value;

let numeros=texto.match(/\d+/g);

return numeros||[];

}

function tradicional(){

let nums=obtenerNumeros();

let salida="RESULTADO TRADICIONAL<br><br>";

nums.forEach(n=>{

let ultimo=parseInt(n.slice(-1));

let pares=metodoTesla[ultimo];

salida+=n+" → "+pares[0]+""+pares[1]+"<br>";

});

document.getElementById("resultado").innerHTML=salida;

}

function poceada(){

let nums=obtenerNumeros();

let frecuencia={};

nums.forEach(n=>{

n.split("").forEach(d=>{

frecuencia[d]=(frecuencia[d]||0)+1;

});

});

let orden=Object.entries(frecuencia).sort((a,b)=>b[1]-a[1]);

let cinco=orden.slice(0,5).map(x=>x[0]);

let tres=orden.slice(5,8).map(x=>x[0]);

let salida="JUGADA POCEADA<br><br>";

salida+="5 FIJOS: "+cinco.join(" - ")+"<br><br>";

salida+="3 APOYO: "+tres.join(" - ");

document.getElementById("resultado").innerHTML=salida;

}

function limpiar(){

document.getElementById("numeros").value="";
document.getElementById("resultado").innerHTML="";

}

</script>

</body>
</html>
