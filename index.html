<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V11</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V11</h1>

<h2>Quiniela Tradicional PRO</h2>

<input type="text" id="inputTradicional" placeholder="Número base o últimos resultados (ej: 1234 5678)">

<button onclick="generarTradicional()">Generar Inteligente</button>

<div id="resultadosTradicional"></div>

<h2>Cargar resultados quiniela (para IA)</h2>

<textarea id="histQuiniela" placeholder="Pegar últimos resultados (uno por línea)"></textarea>

<button onclick="cargarHistQuiniela()">Cargar historial</button>

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada" placeholder="Ingresar 10 números del último sorteo">

<button onclick="generarPoseada()">Generar Poceada</button>

<button onclick="autoPoceada()">AUTO Analizar 20 sorteos</button>

<button onclick="detectorProximo()">Detector próximo sorteo</button>

<div id="resultadosPoseada"></div>

<div id="detectorResultado"></div>

<h2>Cargar 20 sorteos históricos</h2>

<textarea id="historico20"></textarea>

<button onclick="cargarHistorico20()">Cargar histórico</button>

</div>

<script>

const tablaTesla={
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

let historico=[];
let histQuiniela=[];

/* ===== NUEVO TESLA INTELIGENTE ===== */

function generarTradicional(){

let input=document.getElementById("inputTradicional").value.trim();

let numeros=input.split(/[\s,]+/).filter(n=>n.length===4);

if(numeros.length===0){
alert("Ingresá números válidos");
return;
}

let candidatos=[];

numeros.forEach(n=>{

let c1="", c2="";

for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

candidatos.push(c1,c2);

});

/* ANALISIS REAL */

let freq={};

histQuiniela.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});

let evaluados=candidatos.map(n=>{

let score=0;

/* frecuencia */
if(freq[n]) score+=freq[n]*3;

/* atraso */
if(!freq[n]) score+=5;

/* repetición dígitos */
let set=new Set(n.split(''));
if(set.size<=2) score+=3;

return {n,score};

});

evaluados.sort((a,b)=>b.score-a.score);

/* FILTRO PRO */
let finales=evaluados.slice(0,3).map(e=>e.n);

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">
🔥 Números FUERTES:<br>
<span>${finales.join(" - ")}</span>
</div>
`;

}

/* HISTORIAL QUINIELA */

function cargarHistQuiniela(){

let texto=document.getElementById("histQuiniela").value.trim();

histQuiniela=texto.split(/\s+/).filter(n=>n.length===4);

alert("Historial cargado");

}

/* ===== POCEADA ===== */

function espejo(n){
return n[1]+n[0];
}

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

historico.push(input);

if(historico.length>20) historico.shift();

analizarHistorico(input);

}

function analizarHistorico(input){

let freq={},decadas={},finales={},ultima={};

historico.forEach((j,i)=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
let d=Math.floor(parseInt(n)/10);
decadas[d]=(decadas[d]||0)+1;
finales[n[1]]=(finales[n[1]]||0)+1;
ultima[n]=i;
});
});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');
if(input && input.includes(num)) continue;

let score=0;

if(freq[num]) score+=freq[num]*2;
if(!(num in ultima)) score+=5;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,6).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
🎯 Mejor jugada:<br>
<span>${top.join(" - ")}</span>
</div>
`;

}

function detectorProximo(){

if(historico.length<10){
alert("Cargá los sorteos");
return;
}

let freq={},ultima={};

historico.forEach((j,i)=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
ultima[n]=i;
});
});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

let score=0;

if(!freq[num]) score+=6;
if(freq[num]) score+=freq[num]*2;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,5).map(c=>c.num);

document.getElementById("detectorResultado").innerHTML=

`
<div class="resultado">
🔥 Próximo sorteo:<br>
<span>${top.join(" - ")}</span>
</div>
`;

}

function autoPoceada(){
analizarHistorico();
}

function cargarHistorico20(){

let texto=document.getElementById("historico20").value.trim();

let lineas=texto.split(/\n+/);

historico=[];

lineas.slice(0,20).forEach(l=>{
let nums=l.split(/[\s,]+/).map(n=>n.padStart(2,'0'));
if(nums.length===10){
historico.push(nums);
}
});

alert("Histórico cargado");

}

</script>

</body>
</html>
