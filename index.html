<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Tesla PRO V18</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
padding:15px;
}
.container{
max-width:480px;
margin:auto;
}
h1{color:#00F5E0;text-align:center}
h2{color:#FFD700;margin-top:25px;}
input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:16px;
background:#333;
color:#fff;
}
button{
width:100%;
padding:12px;
background:#00F5E0;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:10px;
cursor:pointer;
color:#111;
}
.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
span{
color:#00FFAA;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla PRO V18</h1>

<h2>Historial del día</h2>
<textarea id="historial" placeholder="Pegá números (4 cifras)"></textarea>

<button onclick="guardarBloque('previa')">Guardar Previa</button>
<button onclick="guardarBloque('primera')">Guardar Primera</button>
<button onclick="guardarBloque('matutina')">Guardar Matutina</button>
<button onclick="guardarBloque('vespertina')">Guardar Vespertina</button>

<h2>💣 Cuaterno</h2>
<button onclick="generarCuaterno()">Generar Cuaterno</button>
<div id="resultadoCuaterno" class="resultado"></div>

<h2>🔥 Terno Fuerte</h2>
<button onclick="generarTernoFuerte()">Generar Terno Fuerte</button>
<div id="resultadoTerno" class="resultado"></div>

</div>

<script>

/* ================= BLOQUES ================= */

let dia={
previa:[],
primera:[],
matutina:[],
vespertina:[]
};

function guardarBloque(tipo){
let texto=document.getElementById("historial").value.trim();
let nums=texto.split(/\s+/).filter(n=>n.length===4);
dia[tipo]=nums;
alert(tipo+" guardado");
}

/* ================= CUATERNO ================= */

function generarCuaterno(){

let todos=[];
for(let t in dia){
todos=todos.concat(dia[t]);
}

if(todos.length==0){
document.getElementById("resultadoCuaterno").innerHTML="Sin datos";
return;
}

let freq={};

todos.forEach(n=>{
n.split('').forEach(d=>{
freq[d]=(freq[d]||0)+1;
});
});

let top=Object.entries(freq)
.sort((a,b)=>b[1]-a[1])
.slice(0,4)
.map(x=>x[0]);

let cuaterno=top.join('');

document.getElementById("resultadoCuaterno").innerHTML=`
<div class="resultado">
💣 ${cuaterno}
</div>`;
}

/* ================= TERNO FUERTE ================= */

function generarTernoFuerte(){

let todos=[];
for(let t in dia){
todos=todos.concat(dia[t]);
}

if(todos.length==0){
document.getElementById("resultadoTerno").innerHTML="Sin datos";
return;
}

// contar frecuencia de dígitos
let freq={};

todos.forEach(n=>{
n.split('').forEach(d=>{
freq[d]=(freq[d]||0)+1;
});
});

// ordenar por frecuencia
let orden=Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);

// núcleo fuerte
let base1=orden[0];
let base2=orden[1];
let variable=orden[2] || orden[0];

// generar 2 ternos
let t1 = base1+base2+base1;
let t2 = base1+base2+variable;

document.getElementById("resultadoTerno").innerHTML=`
<div class="resultado">
🔥 Ternos fuertes:<br>
<span>${t1} - ${t2}</span>
</div>`;
}

</script>

</body>
</html>
