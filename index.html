<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Tesla Pro V6</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}

input,textarea{
width:95%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#00F5E0;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V6</h1>

<h2>Quiniela Tradicional</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Generar</button>

<div id="resultadosTradicional"></div>

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada" placeholder="Ingresar 10 números anteriores">

<button onclick="generarPoseada()">Generar</button>

<div id="resultadosPoseada"></div>

</div>

<script>

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],4:['6','9'],
5:['2','7'],6:['4','9'],7:['5','2'],8:['3','0'],9:['3','4']
};

let historico=[];

function generarTradicional(){

let n=document.getElementById("inputTradicional").value;

if(n.length!==4||isNaN(n)) return alert("Número inválido");

let html="";

for(let i=0;i<2;i++){

let cuaterno="",terno="";

for(let j=0;j<4;j++){

let nums=tablaTesla[parseInt(n[j])];

cuaterno+=nums[i%2];

if(j>0)terno+=nums[i%2];

}

let ambos=cuaterno.slice(2,4);

html+=`
<div class="resultado">

Cuaterno: <span>${cuaterno}</span><br>
Terno: <span>${terno}</span><br>
Ambos: <span>${ambos}</span>

</div>`;

}

document.getElementById("resultadosTradicional").innerHTML=html;

}

function espejo(n){

return n[1]+n[0];

}

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10) return alert("Ingresá 10 números");

historico.push(input);

if(historico.length>20) historico.shift();

let freq={},decadas={},finales={},ultimaAparicion={};

historico.forEach((j,i)=>{

j.forEach(n=>{

freq[n]=(freq[n]||0)+1;

let d=Math.floor(parseInt(n)/10);

decadas[d]=(decadas[d]||0)+1;

finales[n[1]]=(finales[n[1]]||0)+1;

ultimaAparicion[n]=i;

});

});

let decadasTop=Object.keys(decadas)
.sort((a,b)=>decadas[b]-decadas[a])
.slice(0,3);

let finalesTop=Object.keys(finales)
.sort((a,b)=>finales[b]-finales[a])
.slice(0,3);

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

if(input.includes(num)) continue;

let score=0;

if(freq[num]) score+=freq[num]*2;

let d=Math.floor(i/10).toString();

if(decadasTop.includes(d)) score+=3;

if(finalesTop.includes(num[1])) score+=3;

let tesla=
tablaTesla[parseInt(num[0])][0]+
tablaTesla[parseInt(num[1])][0];

if(freq[tesla]) score+=2;

if(!(num in ultimaAparicion)) score+=4;

let esp=espejo(num);

if(input.includes(esp)) score+=3;

if(score>=8) score+=3;

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let principal=candidatos.slice(0,6).map(c=>c.num);

let respaldo=candidatos.slice(6,10).map(c=>c.num);

let textoDecadas=decadasTop.map(d=>d+"0").join(" - ");

let textoFinales=finalesTop.join(" - ");

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
Principal: <span>${principal.join(" - ")}</span>
</div>

<div class="resultado">
Respaldo: <span>${respaldo.join(" - ")}</span>
</div>

<div class="resultado">
Décadas activas: <span>${textoDecadas}</span>
</div>

<div class="resultado">
Finales calientes: <span>${textoFinales}</span>
</div>
`;

}

</script>

</body>
</html>
