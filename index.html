<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V18 IA TOTAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}
.container{
max-width:480px;
width:100%;

}
h1{color:#00F5E0}

}

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V18 IA TOTAL</h1>

<h2>Quiniela Tradicional (Tesla)</h2>
<input type="text" id="inputTradicional" placeholder="Número 4 cifras">
<button onclick="generarTradicional()">Generar</button>
<div id="resultadosTradicional"></div>

<h2>Cargar historial del día (IA aprende)</h2>
<textarea id="histQuiniela" placeholder="Pegá todos los sorteos del día"></textarea>

<button onclick="cargarHistQuiniela()">Cargar historial</button>
<button onclick="analizarAmbosIA()">🔥 Ambos IA</button>
<button onclick="generarCuaternoIA()">💣 Cuaterno IA Nocturna</button>

<div id="resultadoIA"></div>
<div id="resultadoCuaternoIA"></div>

<h2>Poceada Inteligente</h2>
<input type="text" id="inputPoseada">
<button onclick="generarPoseada()">Generar Poceada</button>
<button onclick="autoPoceada()">AUTO Analizar</button>
<button onclick="detectorProximo()">Detector próximo</button>

<div id="resultadosPoseada"></div>
<div id="detectorResultado"></div>

</div>

<script>

/* ================= TESLA ================= */

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],
4:['6','9'],5:['2','7'],6:['4','9'],7:['5','2'],
8:['3','0'],9:['3','4']
};

function generarTradicional(){

let n=document.getElementById("inputTradicional").value.trim().replace(/\D/g,'');

if(n.length!==4){
alert("Ingresá 4 cifras");
return;
}

let c1="",c2="";

for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

document.getElementById("resultadosTradicional").innerHTML=
`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Ambos: <span>${c1.slice(2)}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Ambos: <span>${c2.slice(2)}</span>
</div>
`;
}

/* ================= HISTORIAL ================= */

let histQuiniela=[];

function cargarHistQuiniela(){
let texto=document.getElementById("histQuiniela").value.trim();
histQuiniela = texto.split(/\s+/).filter(n=>n.length===4);
alert("Historial cargado");
}

/* ================= IA AMBOS ================= */

function analizarAmbosIA(){

let freq={}, ultima={};

histQuiniela.forEach((n,i)=>{
let ambos=n.slice(2);
freq[ambos]=(freq[ambos]||0)+1;
ultima[ambos]=i;
});

let candidatos=[];

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let score=0;

if(freq[num]) score+=freq[num]*3;
if(!(num in ultima)) score+=5;

if(ultima[num]!=null){
score += (histQuiniela.length - ultima[num]);
}

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,3).map(c=>c.num);

document.getElementById("resultadoIA").innerHTML=
`
<div class="resultado">
🔥 Ambos IA:<br>
<span>${top.join(" - ")}</span>
</div>
`;
}

/* ================= CUATERNO IA ================= */

function generarCuaternoIA(){

if(histQuiniela.length < 5){
alert("Cargá más sorteos");
return;
}

let freqDigitos={};

histQuiniela.forEach(n=>{
let ambos=n.slice(2);
ambos.split('').forEach(d=>{
freqDigitos[d]=(freqDigitos[d]||0)+1;
});
});

let ordenados=Object.entries(freqDigitos)
.sort((a,b)=>b[1]-a[1])
.map(x=>x[0]);

let d1=ordenados[0]||'0';
let d2=ordenados[1]||'1';
let d3=ordenados[2]||'2';
let d4=ordenados[3]||'3';

let c1=d1+d2+d3+d4;
let c2=d2+d1+d4+d3;

document.getElementById("resultadoCuaternoIA").innerHTML=
`
<div class="resultado">
💣 Cuaterno IA:<br>
<span>${c1}</span><br>
<span>${c2}</span>
</div>
`;
}

/* ================= POCEADA ================= */

let historico=[];

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

historico.push(input);
if(historico.length>20) historico.shift();

analizar(input);
}

function analizar(input){

let freq={}, ultima
