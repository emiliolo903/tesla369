<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V17 CRUCE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
justify-content:center;
padding:15px;
}
.container{max-width:480px;width:100%;text-align:center;}
h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea,select{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:10px;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{color:#00FFAA;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V17 CRUCE</h1>

<!-- TESLA -->
<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTesla" placeholder="Número 4 cifras">
<button onclick="generarTesla()">Generar Tesla</button>

<div id="resultadoTesla"></div>

<!-- IA -->
<h2>🧠 IA Quiniela PRO</h2>

<textarea id="inputIA" placeholder="Pegar 7 cuaternos"></textarea>

<select id="turno">
<option value="mañana">Mañana</option>
<option value="tarde">Tarde</option>
<option value="noche">Noche</option>
</select>

<button onclick="usarTurnoAnterior()">Usar turno anterior</button>
<button onclick="generarIA()">Generar IA</button>

<div id="resultadoIA"></div>
<div id="cruceFinal"></div>

<!-- POCEADA -->
<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoceada" placeholder="10 números">
<button onclick="generarPoceada()">Generar</button>

<div id="resultadoPoceada"></div>

</div>

<script>

/* ================= TESLA ================= */

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],
4:['6','9'],5:['2','7'],6:['4','9'],7:['5','2'],
8:['3','0'],9:['3','4']
};

function generarTesla(){

let n=document.getElementById("inputTesla").value;

if(n.length!==4)return alert("4 cifras");

let c1="",c2="";

for(let i=0;i<4;i++){
c1+=tablaTesla[n[i]][0];
c2+=tablaTesla[n[i]][1];
}

document.getElementById("resultadoTesla").innerHTML=`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno: <span>${c1.slice(1)}</span><br>
Ambos: <span>${c1.slice(2)}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno: <span>${c2.slice(1)}</span><br>
Ambos: <span>${c2.slice(2)}</span>
</div>`;
}

/* ================= IA ================= */

let memoriaIA=[];

function limpiar(lista){
return lista.filter(n=>!/(\d)\1\1\1/.test(n));
}

function generarIA(){

let base=document.getElementById("inputIA").value
.split(/\s+/)
.filter(n=>n.length===4);

if(base.length<3)return alert("mínimo 3");

memoriaIA.push(base);
if(memoriaIA.length>30) memoriaIA.shift();

/* frecuencia */
let freq={};

base.forEach(n=>{
n.split('').forEach(d=>{
freq[d]=(freq[d]||0)+1;
});
});

/* generar candidatos */
let candidatos=[];

for(let i=0;i<10000;i++){

let num=i.toString().padStart(4,'0');

let score=0;

num.split('').forEach(d=>{
if(freq[d]) score+=freq[d];
});

/* evitar basura */
if(/(\d)\1\1/.test(num)) score-=10;

/* atraso */
let salio=false;
memoriaIA.forEach(h=>{
if(h.includes(num)) salio=true;
});
if(!salio) score+=5;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let jugadas=limpiar(
candidatos.slice(0,20).map(x=>x.num)
).slice(0,3);

mostrarIA(jugadas);

/* CRUCE AUTOMÁTICO */
cruceAutomatico(jugadas[0]);
}

function mostrarIA(jugadas){

let turno=document.getElementById("turno").value;

let html="";

jugadas.forEach((n,i)=>{

let t=turno;

if(i===1) t="mañana";
if(i===2) t="noche";

html+=`
<div class="resultado">
🔥 ${n}<br>
🎯 Terno: <span>${n.slice(1)}</span><br>
💰 Ambos: <span>${n.slice(2)}</span><br>
⏰ ${t}
</div>`;
});

document.getElementById("resultadoIA").innerHTML=html;
}

/* ================= CRUCE ================= */

function cruceAutomatico(num){

let c1="",c2="";

for(let i=0;i<4;i++){
c1+=tablaTesla[num[i]][0];
c2+=tablaTesla[num[i]][1];
}

let aIA=num.slice(2);
let aT1=c1.slice(2);
let aT2=c2.slice(2);
let espejo=aIA[1]+aIA[0];

let score={};

function s(n,v){score[n]=(score[n]||0)+v;}

s(aIA,5);
s(aT1,4);
s(aT2,4);
s(espejo,6);

if(aIA===aT1) s(aIA,6);
if(aIA===aT2) s(aIA,6);

let orden=Object.entries(score).sort((a,b)=>b[1]-a[1]);

let fuerte=orden[0][0];
let respaldo=orden[1]?orden[1][0]:"-";

document.getElementById("cruceFinal").innerHTML=`
<div class="resultado">
💣 CRUCE FINAL<br><br>
🔥 FUERTE: <span>${fuerte}</span><br>
🛟 RESPALDO: <span>${respaldo}</span>
</div>`;
}

/* ================= TURNO ================= */

function usarTurnoAnterior(){

let t=document.getElementById("turno");

if(t.value==="mañana") t.value="noche";
else if(t.value==="tarde") t.value="mañana";
else t.value="tarde";

alert("Turno ajustado");
}

/* ================= POCEADA ================= */

let histP=[];

function generarPoceada(){

let nums=document.getElementById("inputPoceada").value
.split(/\s+/)
.map(n=>n.padStart(2,'0'));

if(nums.length!==10) return alert("10 números");

histP.push(nums);
if(histP.length>20) histP.shift();

let freq={};

histP.forEach(j=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});
});

let cand=[];

for(let i=0;i<100;i++){

let n=i.toString().padStart(2,'0');

let score=0;

if(freq[n]) score+=freq[n]*2;
else score+=5;

cand.push({n,score});
}

cand.sort((a,b)=>b.score-a.score);

let top=cand.slice(0,5).map(x=>x.n);

document.getElementById("resultadoPoceada").innerHTML=`
<div class="resultado">
🎯 ${top.join(" - ")}
</div>`;
}

</script>

</body>
</html>
