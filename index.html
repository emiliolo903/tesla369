<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V15 COMPLETA</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
justify-content:center;
padding:15px;
}
.container{max-width:480px;width:100%;text-align:center;}
h1{color:#00F5E0}
h2{color:#FFD700}
input,textarea{
width:95%;padding:10px;font-size:16px;border-radius:8px;border:none;margin-bottom:10px;
}
button{
width:100%;padding:12px;font-size:16px;background:#00F5E0;color:#111;border:none;border-radius:8px;margin-bottom:15px;
}
.resultado{
background:#222;padding:10px;border-radius:10px;margin-bottom:10px;text-align:left;
}
span{color:#00FFAA;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V15 COMPLETA</h1>

<!-- ===== TESLA ===== -->

<h2>Quiniela Tradicional (Tesla)</h2>
<input type="text" id="inputTradicional">
<button onclick="generarTradicional()">Generar Tesla</button>
<div id="resultadosTradicional"></div>

<!-- ===== IA ===== -->

<h2>IA Quiniela REAL</h2>
<textarea id="baseIA" placeholder="7 cuaternos anteriores"></textarea>
<button onclick="generarIA()">Generar IA V15</button>
<div id="resultadoIA"></div>

<!-- ===== POCEADA ===== -->

<h2>Poceada Inteligente</h2>
<input type="text" id="inputPoseada" placeholder="10 números del sorteo">
<button onclick="generarPoseada()">Generar Poceada</button>
<div id="resultadosPoseada"></div>

</div>

<script>

/* ===== TESLA ===== */

const tablaTesla={
0:['0','0'],1:['0','0'],2:['5','7'],3:['8','0'],
4:['6','9'],5:['2','7'],6:['4','9'],7:['5','2'],
8:['3','0'],9:['3','4']
};

function generarTradicional(){
let n=document.getElementById("inputTradicional").value;
if(n.length!==4)return alert("4 cifras");

let c1="",c2="";
for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

let t1=c1.slice(1);
let t2=c2.slice(1);

let a1=c1.slice(2);
let a2=c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML=
`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno: <span>${t1}</span><br>
Ambos: <span>${a1}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno: <span>${t2}</span><br>
Ambos: <span>${a2}</span>
</div>
`;
}

/* ===== IA V15 ===== */

function generarIA(){

let base=document.getElementById("baseIA").value
.split(/[\s,]+/)
.filter(n=>n.length===4);

if(base.length<7)return alert("Cargar 7");

/* ZONA */
let miles={};
base.forEach(n=>{
miles[n[0]]=(miles[n[0]]||0)+1;
});

let zonaPrincipal=Object.keys(miles).sort((a,b)=>miles[b]-miles[a])[0];
let zonaSecundaria=Object.keys(miles).sort((a,b)=>miles[b]-miles[a])[1];

/* FINALES */
let finales={};
base.forEach(n=>{
let f=n.slice(2);
finales[f]=(finales[f]||0)+1;
});

let finalesTop=Object.keys(finales)
.sort((a,b)=>finales[b]-finales[a])
.slice(0,4);

/* GENERADOR */
function generar(tipo){

for(let i=0;i<50;i++){

let baseNum=base[Math.floor(Math.random()*base.length)];

let n="";

if(tipo==="fuerte"){
n=zonaPrincipal + baseNum[1] + baseNum[2] + baseNum[3];
}
else if(tipo==="medio"){
n=zonaSecundaria + baseNum[1] + baseNum[2] + baseNum[3];
}
else{
n=zonaPrincipal + baseNum[1] + baseNum[2] + base[Math.floor(Math.random()*base.length)][3];
}

if(base.includes(n)) continue;
if(/^(\d)\1+$/.test(n)) continue;
if(!finalesTop.includes(n.slice(2))) continue;

return n;
}

return null;
}

/* GENERAR */
let fuerte=generar("fuerte")||"----";
let medio=generar("medio")||"----";
let riesgo=generar("riesgo")||"----";

/* MOSTRAR */

document.getElementById("resultadoIA").innerHTML=

`
<div class="resultado">
📊 Zona: <span>${zonaPrincipal}XXX</span><br>
🔥 Finales: <span>${finalesTop.join(" - ")}</span>
</div>

<div class="resultado">🥇 <span>${fuerte}</span></div>
<div class="resultado">🥈 <span>${medio}</span></div>
<div class="resultado">🥉 <span>${riesgo}</span></div>
`;

}

/* ===== POCEADA ===== */

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

let freq={};

input.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

if(input.includes(num)) continue;

let score=0;

/* atraso */
score+=3;

/* repetición inversa */
let esp=num[1]+num[0];
if(input.includes(esp)) score+=2;

/* vecinos */
input.forEach(n=>{
let base=parseInt(n);
let vecinos=[base-1,base+1];
vecinos.forEach(v=>{
if(v>=0 && v<=99){
if(v.toString().padStart(2,'0')===num){
score+=2;
}
}
});
});

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let resultado=candidatos.slice(0,6).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
🎯 Jugada:<br>
<span>${resultado.join(" - ")}</span>
</div>
`;

}

</script>

</body>
</html>
