<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V12 DIOS 2</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V12 DIOS 2</h1>

<h2>Quiniela Tradicional (Tesla)</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Generar Tesla</button>

<div id="resultadosTradicional"></div>

<h2>IA Quiniela (Nivel Dios 2)</h2>

<textarea id="histQuiniela" placeholder="Pegar últimos cuaternos (uno por línea)"></textarea>

<button onclick="cargarHistQuiniela()">Cargar historial</button>

<button onclick="generarIA()">Generar IA</button>

<div id="resultadosIA"></div>

<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada">

<button onclick="generarPoseada()">Generar Poceada</button>

<button onclick="autoPoceada()">AUTO Analizar</button>

<button onclick="detectorProximo()">Detector próximo</button>

<div id="resultadosPoseada"></div>

<div id="detectorResultado"></div>

<h2>Cargar 20 sorteos históricos</h2>

<textarea id="historico20"></textarea>

<button onclick="cargarHistorico20()">Cargar histórico</button>

</div>

<script>

const tablaTesla={
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

let historico=[];
let histQuiniela=[];

/* ===== TESLA ===== */

function generarTradicional(){

let n=document.getElementById("inputTradicional").value.trim().replace(/\D/g,'');

if(n.length!==4){
alert("Ingresá 4 cifras");
return;
}

let c1="",c2="";

for(let i=0;i<4;i++){
let d=parseInt(n[i]);
c1+=tablaTesla[d][0];
c2+=tablaTesla[d][1];
}

let t1=c1.slice(1);
let t2=c2.slice(1);

let a1=c1.slice(2);
let a2=c2.slice(2);

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">
Cuaterno 1: <span>${c1}</span><br>
Terno 1: <span>${t1}</span><br>
Ambos 1: <span>${a1}</span>
</div>

<div class="resultado">
Cuaterno 2: <span>${c2}</span><br>
Terno 2: <span>${t2}</span><br>
Ambos 2: <span>${a2}</span>
</div>
`;

}

/* ===== IA NIVEL DIOS 2 ===== */

function generarIA(){

let freq={}, ultima={};

histQuiniela.forEach((n,i)=>{
freq[n]=(freq[n]||0)+1;
ultima[n]=i;
});

let pos=[{},{},{},{}];

histQuiniela.forEach(n=>{
for(let i=0;i<4;i++){
let d=n[i];
pos[i][d]=(pos[i][d]||0)+1;
}
});

let candidatos=[];

for(let i=0;i<10000;i++){

let num=i.toString().padStart(4,'0');
let score=0;

if(freq[num]) score+=freq[num]*4;

if(!(num in ultima)) score+=6;
else{
let atraso = histQuiniela.length - ultima[num];
if(atraso>10) score+=4;
}

for(let i=0;i<4;i++){
let d=num[i];
if(pos[i][d]) score+=pos[i][d]*2;
}

let set=new Set(num.split(''));

if(set.size===1) score-=8;
if(set.size===2) score+=1;
if(set.size>=3) score+=4;

let conteo={};
num.split('').forEach(d=>conteo[d]=(conteo[d]||0)+1);
Object.values(conteo).forEach(c=>{
if(c>=3) score-=4;
});

let finales={};
histQuiniela.forEach(n=>{
let f=n.slice(2);
finales[f]=(finales[f]||0)+1;
});
if(finales[num.slice(2)]) score+=3;

let tesla="";
for(let j=0;j<4;j++){
tesla+=tablaTesla[parseInt(num[j])][0];
}
if(freq[tesla]) score+=2;

histQuiniela.slice(-5).forEach(n=>{
let base=parseInt(n);
let vecinos=[base-1,base+1];
vecinos.forEach(v=>{
if(v>=0 && v<=9999){
let vv=v.toString().padStart(4,'0');
if(vv===num) score+=2;
}
});
});

histQuiniela.slice(-10).forEach(n=>{
if(n.slice(0,2)===num.slice(0,2)) score+=2;
if(n.slice(2)===num.slice(2)) score+=2;
});

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let finales=[];

for(let i=0;i<candidatos.length;i++){

let n=candidatos[i].num;

let repetido=finales.some(f=>{
return f.slice(2)===n.slice(2);
});

if(!repetido){
finales.push(n);
}

if(finales.length===3) break;
}

document.getElementById("resultadosIA").innerHTML=

`
<div class="resultado">
🧠 IA NIVEL DIOS 2:<br>
<span>${finales.join(" - ")}</span>
</div>
`;

}

function cargarHistQuiniela(){
let texto=document.getElementById("histQuiniela").value.trim();
histQuiniela=texto.split(/\s+/).filter(n=>n.length===4);
alert("Historial cargado");
}

/* ===== POCEADA ===== */

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

historico.push(input);
if(historico.length>20) historico.shift();

analizar(input);

}

function analizar(input){

let freq={},ultima={};

historico.forEach((j,i)=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
ultima[n]=i;
});
});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');
if(input.includes(num)) continue;

let score=0;

if(freq[num]) score+=freq[num]*2;
if(!(num in ultima)) score+=6;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let principal=candidatos.slice(0,5).map(c=>c.num);
let respaldo=candidatos.slice(5,8).map(c=>c.num);
let radar=candidatos.slice(8,10).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">🎯 Principal: <span>${principal.join(" - ")}</span></div>
<div class="resultado">🛟 Respaldo: <span>${respaldo.join(" - ")}</span></div>
<div class="resultado">📡 Radar: <span>${radar.join(" - ")}</span></div>
`;

}

function detectorProximo(){

let freq={};

historico.forEach(j=>{
j.forEach(n=>{
freq[n]=(freq[n]||0)+1;
});
});

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

let score=0;

if(!freq[num]) score+=6;
if(freq[num]) score+=freq[num]*2;

candidatos.push({num,score});
}

candidatos.sort((a,b)=>b.score-a.score);

let top=candidatos.slice(0,5).map(c=>c.num);

document.getElementById("detectorResultado").innerHTML=

`
<div class="resultado">
🔥 Próximo sorteo:<br>
<span>${top.join(" - ")}</span>
</div>
`;

}

function autoPoceada(){
analizar([]);
}

function cargarHistorico20(){

let texto=document.getElementById("historico20").value.trim();
let lineas=texto.split(/\n+/);

historico=[];

lineas.slice(0,20).forEach(l=>{
let nums=l.split(/[\s,]+/).map(n=>n.padStart(2,'0'));
if(nums.length===10){
historico.push(nums);
}
});

alert("Histórico cargado");

}

</script>

</body>
  </html>
