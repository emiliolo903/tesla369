<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMI Tesla Pro V9</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111111;
color:#ffffff;
display:flex;
justify-content:center;
padding:15px;
}

.container{
max-width:480px;
width:100%;
text-align:center;
}

h1{color:#00F5E0}
h2{color:#FFD700}

input,textarea{
width:95%;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00F5E0;
color:#111;
border:none;
border-radius:8px;
margin-bottom:15px;
cursor:pointer;
}

.resultado{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
text-align:left;
}

span{
color:#00FFAA;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 EMI Tesla Pro V9</h1>

<h2>Quiniela Tradicional PRO</h2>

<input type="text" id="inputTradicional" placeholder="Número 4 cifras">

<button onclick="generarTradicional()">Analizar Número</button>

<div id="resultadosTradicional"></div>


<h2>Poceada Inteligente</h2>

<input type="text" id="inputPoseada" placeholder="Ingresar 10 números del último sorteo">

<button onclick="generarPoseada()">Generar Poceada</button>

<div id="resultadosPoseada"></div>


<h2>Cargar 20 sorteos históricos</h2>

<textarea id="historico20" placeholder="Pegar 20 sorteos (10 números por línea)"></textarea>

<button onclick="cargarHistorico20()">Cargar histórico</button>

</div>

<script>

const tablaTesla={
0:['0','0'],
1:['0','0'],
2:['5','7'],
3:['8','0'],
4:['6','9'],
5:['2','7'],
6:['4','9'],
7:['5','2'],
8:['3','0'],
9:['3','4']
};

let historico=[];

function espejo4(n){
return n.split('').reverse().join('');
}

function generarTradicional(){

let n=document.getElementById("inputTradicional").value;

if(n.length!==4||isNaN(n)){
alert("Número inválido");
return;
}

let resultados=[];

/* original */
resultados.push(n);

/* espejo */
resultados.push(espejo4(n));

/* vecinos */
let base=parseInt(n);

let vecinos=[
base-1,
base+1,
base-10,
base+10
];

vecinos.forEach(v=>{
if(v>=0 && v<=9999){
resultados.push(v.toString().padStart(4,'0'));
}
});

/* eliminar duplicados */

resultados=[...new Set(resultados)];

let cuaternos=resultados.slice(0,6);

let ternos=cuaternos.map(n=>n.slice(1,4));

let ambos=cuaternos.map(n=>n.slice(2,4));

document.getElementById("resultadosTradicional").innerHTML=

`
<div class="resultado">
Cuaternos fuertes:<br>
<span>${cuaternos.join(" - ")}</span>
</div>

<div class="resultado">
Ternos:<br>
<span>${ternos.join(" - ")}</span>
</div>

<div class="resultado">
Ambos:<br>
<span>${ambos.join(" - ")}</span>
</div>
`;

}

/* ===== POCEADA ===== */

function espejo(n){
return n[1]+n[0];
}

function generarPoseada(){

let input=document.getElementById("inputPoseada").value
.split(/[\s,]+/)
.map(v=>v.padStart(2,'0'));

if(input.length!==10){
alert("Ingresá 10 números");
return;
}

historico.push(input);

if(historico.length>20) historico.shift();

let freq={};
let decadas={};
let finales={};
let ultima={};

historico.forEach((j,i)=>{

j.forEach(n=>{

freq[n]=(freq[n]||0)+1;

let d=Math.floor(parseInt(n)/10);

decadas[d]=(decadas[d]||0)+1;

finales[n[1]]=(finales[n[1]]||0)+1;

ultima[n]=i;

});

});

let decadasTop=Object.keys(decadas)
.sort((a,b)=>decadas[b]-decadas[a])
.slice(0,3);

let finalesTop=Object.keys(finales)
.sort((a,b)=>finales[b]-finales[a])
.slice(0,3);

let candidatos=[];

for(let i=0;i<100;i++){

let num=i.toString().padStart(2,'0');

if(input.includes(num)) continue;

let score=0;

if(freq[num]) score+=freq[num]*2;

let d=Math.floor(i/10).toString();

if(decadasTop.includes(d)) score+=3;

if(finalesTop.includes(num[1])) score+=3;

if(!(num in ultima)) score+=5;

let esp=espejo(num);

if(input.includes(esp)) score+=3;

/* vecinos */

input.forEach(n=>{

let base=parseInt(n);

let vecinos=[base-1,base+1,base-10,base+10];

vecinos.forEach(v=>{

if(v>=0 && v<=99){

let vv=v.toString().padStart(2,'0');

if(vv===num) score+=3;

}

});

});

if(freq[num] >=2) score+=3;

candidatos.push({num,score});

}

candidatos.sort((a,b)=>b.score-a.score);

let expansion=candidatos.slice(0,14);

let principal=expansion.slice(0,6).map(c=>c.num);

let respaldo=expansion.slice(6,10).map(c=>c.num);

let radar=expansion.slice(10,14).map(c=>c.num);

document.getElementById("resultadosPoseada").innerHTML=

`
<div class="resultado">
Principal: <span>${principal.join(" - ")}</span>
</div>

<div class="resultado">
Respaldo: <span>${respaldo.join(" - ")}</span>
</div>

<div class="resultado">
Radar atraso: <span>${radar.join(" - ")}</span>
</div>
`;

}

function cargarHistorico20(){

let texto=document.getElementById("historico20").value.trim();

let lineas=texto.split(/\n+/);

historico=[];

lineas.slice(0,20).forEach(l=>{

let nums=l.split(/[\s,]+/).map(n=>n.padStart(2,'0'));

if(nums.length===10){
historico.push(nums);
}

});

alert("Histórico cargado");

}

</script>

</body>
</html>
